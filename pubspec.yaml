name: librarymanagement
description: "A digital library management application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

# Splash screen ONLY for mobile
flutter_native_splash:
  color: "#ffffff"
  image: assets/images/mobile_logo.png
  android: true
  ios: true
  web: false

# App icon configuration
flutter_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/mobile_logo.png"

  image_path: "assets/images/mobile_logo.png"

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/mobile_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/clean_library_catalog.json
    - assets/final_database_clean.json
    - assets/images/